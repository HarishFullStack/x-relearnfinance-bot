name: X Finance Bot

on:
  schedule:
    - cron: "30 2 * * *"  # scheduled
    - cron: "30 6 * * *"  # calculator
    - cron: "30 12 * * *"  # ai
  workflow_dispatch:
    inputs:
      post_type:
        description: "Post type: 'scheduled', 'calculator', or 'ai'"
        required: true
        default: "scheduled"

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Determine post type
        id: post_type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.post_type }}" >> $GITHUB_OUTPUT
          else
            SCHEDULE="${{ github.event.schedule }}"
            case "$SCHEDULE" in
              "30 2 * * *")
                echo "type=scheduled" >> $GITHUB_OUTPUT
                ;;
              "30 6 * * *")
                echo "type=calculator" >> $GITHUB_OUTPUT
                ;;
              "30 12 * * *")
                echo "type=ai" >> $GITHUB_OUTPUT
                ;;
              *)
                echo "type=ai" >> $GITHUB_OUTPUT
                ;;
            esac
          fi

      - name: Run bot
        env:
          POST_TYPE: ${{ steps.post_type.outputs.type }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python post_to_x.py
