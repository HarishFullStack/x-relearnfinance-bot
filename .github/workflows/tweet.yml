name: X Finance Bot

on:
  schedule:
    # Post 1 — 8:00 AM IST = 2:30 AM UTC
    - cron: "30 2 * * *"
    # Post 2 — 12:00 PM IST = 6:30 AM UTC
    - cron: "30 6 * * *"
    # Post 3 — 6:00 PM IST = 12:30 PM UTC
    - cron: "30 12 * * *"
  workflow_dispatch:
    inputs:
      post_type:
        description: "Post type: 'scheduled', 'calculator', or 'ai'"
        required: true
        default: "scheduled"

jobs:

  morning-post:
    name: Morning Pre-written Post (8AM IST)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && github.event.schedule == '30 2 * * *')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python post_to_x.py
        env:
          POST_TYPE: scheduled
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  calculator-post:
    name: Calculator Promo Post (12PM IST)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '30 6 * * *'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python post_to_x.py
        env:
          POST_TYPE: calculator
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  evening-post:
    name: Evening AI Post (6PM IST)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '30 12 * * *'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python post_to_x.py
        env:
          POST_TYPE: ai
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
