name: X Finance Bot

on:
  schedule:
    # Post 1 — 8:00 AM EST (pre-written finance insight)
    - cron: "0 13 * * *"
    # Post 2 — 12:00 PM EST (financial fitness calculator promo)
    - cron: "0 17 * * *"
    # Post 3 — 6:00 PM EST (AI-generated finance content)
    - cron: "0 23 * * *"
  workflow_dispatch:  # Allows manual trigger from GitHub UI for testing
    inputs:
      post_type:
        description: "Post type: 'scheduled', 'calculator', or 'ai'"
        required: true
        default: "scheduled"

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine post type
        id: post_type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.post_type }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +"%H")
            if [ "$HOUR" = "13" ]; then
              echo "type=scheduled" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "17" ]; then
              echo "type=calculator" >> $GITHUB_OUTPUT
            else
              echo "type=ai" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run bot
        env:
          POST_TYPE: ${{ steps.post_type.outputs.type }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python post_to_x.py
