name: X Finance Bot

on:
  schedule:
    # Post 1 — 8:00 AM IST (pre-written finance insight) = 2:30 AM UTC
    - cron: "30 2 * * *"
    # Post 2 — 12:00 PM IST (financial fitness calculator promo) = 6:30 AM UTC
    - cron: "30 6 * * *"
    # Post 3 — 6:00 PM IST (AI-generated finance content) = 12:30 PM UTC
    - cron: "30 12 * * *"
  workflow_dispatch:  # Allows manual trigger from GitHub UI for testing
    inputs:
      post_type:
        description: "Post type: 'scheduled', 'calculator', or 'ai'"
        required: true
        default: "scheduled"

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine post type
        id: post_type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.post_type }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +"%H")
            MIN=$(date -u +"%M")
            if [ "$HOUR$MIN" = "0230" ]; then
              echo "type=scheduled" >> $GITHUB_OUTPUT
            elif [ "$HOUR$MIN" = "0630" ]; then
              echo "type=calculator" >> $GITHUB_OUTPUT
            else
              echo "type=ai" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run bot
        env:
          POST_TYPE: ${{ steps.post_type.outputs.type }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python post_to_x.py
